<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Style</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .hero-bg {
            /* Aquí cargamos tu imagen */
            background-image: url('nsmxhome.jpg');
            
            /* Configuraciones para que cubra toda la pantalla */
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            /* Opcional: Centrar contenido si quieres poner texto encima */
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="hero-bg">
        </div>
</body>
</html>
