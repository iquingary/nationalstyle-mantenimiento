<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Style — Sitio en mantenimiento</title>
<meta name="description" content="National Style está renovando su sitio web. Vuelve pronto.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAFAF8;
    --ink: #121212;
    --ink-soft: #5C5A55;
    --thread: #A6792A;
    --line: #E4E1D8;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
  }

  body{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 6vw;
    font-family: 'Fraunces', Georgia, serif;
    overflow-x: hidden;
  }

  .page{
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .logo{
    width: min(92vw, 460px);
    height: auto;
    opacity: 0;
    transform: translateY(8px);
    animation: rise 0.9s cubic-bezier(.2,.8,.2,1) 0.1s forwards;
  }

  .stitch-wrap{
    width: 100%;
    max-width: 280px;
    margin: 2.4rem 0 2.1rem;
  }

  .stitch{
    width: 100%;
    height: 14px;
    display: block;
    overflow: visible;
  }

  .stitch path{
    fill: none;
    stroke: var(--thread);
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-dasharray: 7 6;
    stroke-dashoffset: 240;
    animation: sew 1.6s ease-out 0.5s forwards;
  }

  .stitch circle{
    fill: var(--thread);
    opacity: 0;
    animation: dot-in 0.4s ease-out 2.0s forwards;
  }

  .eyebrow{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--thread);
    margin: 0 0 1.1rem;
    opacity: 0;
    animation: fade-up 0.7s ease-out 0.55s forwards;
  }

  h1{
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(22px, 3.6vw, 28px);
    line-height: 1.45;
    margin: 0 0 0.9rem;
    color: var(--ink);
    opacity: 0;
    animation: fade-up 0.7s ease-out 0.75s forwards;
  }

  p.sub{
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: clamp(15px, 2.2vw, 17px);
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0;
    max-width: 460px;
    opacity: 0;
    animation: fade-up 0.7s ease-out 0.95s forwards;
  }

  footer{
    margin-top: 3.2rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: #B4B1A6;
    opacity: 0;
    animation: fade-up 0.7s ease-out 1.15s forwards;
  }

  @keyframes rise{
    to{ opacity: 1; transform: translateY(0); }
  }

  @keyframes fade-up{
    from{ opacity: 0; transform: translateY(6px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  @keyframes sew{
    to{ stroke-dashoffset: 0; }
  }

  @keyframes dot-in{
    to{ opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce){
    .logo, .eyebrow, h1, p.sub, footer, .stitch path, .stitch circle{
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      stroke-dashoffset: 0 !important;
    }
  }
</style>
</head>
<body>

  <main class="page">

    <img class="logo" src="nationalstyle.png" alt="National Style">

    <div class="stitch-wrap">
      <svg class="stitch" viewBox="0 0 280 14" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <path d="M2,7 L278,7" pathLength="240"></path>
        <circle cx="140" cy="7" r="2.4"></circle>
      </svg>
    </div>

    <p class="eyebrow">Sitio en mantenimiento</p>

    <h1>Nuestro sitio web se encuentra actualmente en mantenimiento.</h1>
    <p class="sub">Estamos trabajando para ofrecerte una mejor experiencia. ¡Volveremos muy pronto!</p>

    <footer>NATIONAL STYLE · MÉXICO</footer>

  </main>

</body>
</html>
